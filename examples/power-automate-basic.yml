name: Flowcerta Governance Gate (Power Automate)

on:
  pull_request:
    paths: ['**.json', '**.zip']
  push:
    branches: [main]
    paths: ['**.json', '**.zip']

jobs:
  governance-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Power Automate flows
        uses: flowcerta/validate-action@v1
        with:
          api_key: ${{ secrets.FLOWCERTA_API_KEY }}
          files: |
            flows/InvoiceApproval.json
            flows/VendorOnboarding.zip
          platform: power_automate
          # Enforce a named policy pack instead of the org default.
          # Useful when the same workflow file is gated by different
          # rule sets in different environments (e.g. soc2-prod vs dev).
          policy_pack_slug: soc2-prod
          enforcement_mode: blocking
